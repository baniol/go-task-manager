name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
          - goos: linux
            goarch: arm64
            runner: ubuntu-latest
          # - goos: darwin
          #   goarch: amd64
          #   runner: macos-latest
          - goos: darwin
            goarch: arm64
            runner: macos-latest
          # - goos: windows
          #   goarch: amd64
          #   runner: windows-latest
          #   ext: .exe
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          version="${GITHUB_REF_NAME}"
          out="tm-${version}-${GOOS}-${GOARCH}${{ matrix.ext }}"
          go build -trimpath \
            -ldflags="-s -w -X 'go-task-manager/internal/cli.version=${version}'" \
            -o "${out}" ./cmd/tm

      - name: Package
        shell: bash
        run: |
          version="${GITHUB_REF_NAME}"
          base="tm-${version}-${{ matrix.goos }}-${{ matrix.goarch }}"
          bin="${base}${{ matrix.ext }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            7z a "${base}.zip" "${bin}" README.md
            echo "ASSET=${base}.zip" >> "$GITHUB_ENV"
          else
            tar -czf "${base}.tar.gz" "${bin}" README.md
            echo "ASSET=${base}.tar.gz" >> "$GITHUB_ENV"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ASSET }}
          path: ${{ env.ASSET }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Extract changelog section
        run: |
          version="${GITHUB_REF_NAME}"
          notes=$(awk -v ver="${version}" '
            /^## \[/ { if (found) exit; if (index($0, "[" ver "]")) found=1; next }
            found { print }
          ' CHANGELOG.md)
          if [ -z "$notes" ]; then
            echo "warning: no changelog entry found for ${version}"
          fi
          {
            echo "RELEASE_NOTES<<EOF"
            echo "$notes"
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          body: ${{ env.RELEASE_NOTES }}
          fail_on_unmatched_files: true
